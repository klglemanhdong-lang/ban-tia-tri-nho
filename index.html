<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bắn Tỉa Siêu Trí Nhớ - Horizontal Row</title>
    <style>
        :root {
            --bg-color: #f0f8ff;
            --primary-red: #d32f2f;
            --primary-green: #4CAF50;
            --card-width: 70px; /* Độ rộng cố định nhỏ để xếp được nhiều thẻ */
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #1a1a1a; 
            margin: 0; padding: 0; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; overflow: hidden; user-select: none; 
        }

        /* Quy tắc 1: Cố định tỷ lệ 9/16 */
        #game-container {
            width: 100vw;
            max-height: 100vh;
            aspect-ratio: 9 / 16;
            background: var(--bg-color) url('b1.jpg') no-repeat center center; 
            background-size: cover;
            position: relative;
            margin: auto;
            border: 6px solid #333;
            border-radius: 25px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @media (max-width: 500px) { #game-container { border: none; border-radius: 0; } }

        h1 { color: var(--primary-red); font-size: 6.5vw; margin: 8% 0 2%; text-transform: uppercase; }
        #timer-box { font-size: 5vw; font-weight: bold; background: rgba(255,255,255,0.8); padding: 2% 6%; border-radius: 15px; margin-bottom: 5%; }

        /* Quy tắc: 11 hình/số trên một hàng ngang có thanh cuộn */
        .card-row-wrapper {
            width: 95%;
            overflow-x: auto; /* Cho phép vuốt ngang */
            padding: 10px 0;
            display: flex;
            scrollbar-width: none; /* Ẩn scrollbar Firefox */
        }
        .card-row-wrapper::-webkit-scrollbar { display: none; } /* Ẩn scrollbar Chrome/Safari */

        .row-inner {
            display: flex;
            gap: 10px;
            padding: 0 10px;
        }

        .card { 
            flex: 0 0 var(--card-width); /* Không cho phép co giãn, giữ đúng độ rộng */
            height: 95px;
            background: #fff; border: 2px solid var(--primary-green); 
            border-radius: 10px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative;
        }

        .number-card { font-size: 28px; color: #1976D2; font-weight: bold; }
        .image-card { background-color: #FFF9C4; border-color: #FBC02D; }
        .image-card img { width: 85%; height: 60%; object-fit: contain; }
        .image-name { font-size: 10px; text-align: center; font-weight: bold; margin-top: 4px; }

        /* Trạng thái thẻ */
        .selected { border: 4px solid #f44336; transform: scale(1.05); }
        .selected::after { content: "🎯"; position: absolute; top: -10px; font-size: 20px; }
        .hidden-card { visibility: hidden; pointer-events: none; }
        .shake { animation: shake 0.3s; }

        /* Modals: Căn giữa tuyệt đối, không tràn viền */
        .modal { 
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 2000;
            padding: 10%; box-sizing: border-box;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            width: 100%;
            box-sizing: border-box;
        }

        .modal h2 { font-size: 8vw; color: #FFEB3B; margin-bottom: 20px; text-align: center; }
        .modal p { font-size: 4.5vw; color: #fff; line-height: 1.6; text-align: center; margin-bottom: 20px; }
        
        button { 
            width: 100%; padding: 15px; font-size: 5vw; background: #ff9800; 
            color: white; border: none; border-radius: 12px; font-weight: bold;
        }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>Bắn Tỉa Trí Nhớ</h1>
        <div id="timer-box">⏱ <span id="time-left">60</span>s</div>

        <p style="font-weight: bold; color: #333; margin: 0;">CHỌN SỐ:</p>
        <div class="card-row-wrapper">
            <div id="top-row" class="row-inner"></div>
        </div>

        <div style="height: 4vh;"></div>

        <p style="font-weight: bold; color: #333; margin: 0;">BẮN HÌNH:</p>
        <div class="card-row-wrapper">
            <div id="bottom-row" class="row-inner"></div>
        </div>

        <div id="rule-modal" class="modal active">
            <div class="modal-content">
                <h2>📜 LUẬT CHƠI</h2>
                <p>Vuốt ngang để tìm thẻ.<br>Chọn <b>Số</b> trước, <b>Hình</b> sau để ghi điểm!</p>
                <button onclick="startGame()">BẮT ĐẦU NGAY</button>
            </div>
        </div>

        <div id="win-modal" class="modal">
            <div class="modal-content">
                <h2>CHIẾN THẮNG! 🎉</h2>
                <p>Bạn có trí nhớ thật tuyệt vời.</p>
                <button onclick="location.reload()">CHƠI LẠI</button>
            </div>
        </div>

        <div id="lose-modal" class="modal">
            <div class="modal-content">
                <h2>THẤT BẠI 😢</h2>
                <p>Hết thời gian rồi, thử lại nhé!</p>
                <button onclick="location.reload()">THỬ LẠI</button>
            </div>
        </div>
    </div>

    <script>
        const gameData = [
            { id: 0, label: "00", text: "Quả trứng" }, { id: 1, label: "01", text: "Cây dù" },
            { id: 2, label: "02", text: "Con vịt" }, { id: 3, label: "03", text: "Trái tim" },
            { id: 4, label: "04", text: "Cái ghế" }, { id: 5, label: "05", text: "Quả táo" },
            { id: 6, label: "06", text: "Vỏ ốc" }, { id: 7, label: "07", text: "Cây rìu" },
            { id: 8, label: "08", text: "Người tuyết" }, { id: 9, label: "09", text: "Hươu cao cổ" },
            { id: 10, label: "10", text: "Con heo" }
        ];

        let selectedNumberId = null;
        let selectedNumberElement = null;
        let matchedPairs = 0;
        let timeLeft = 60;
        let timerInterval;

        function startGame() {
            document.getElementById('rule-modal').classList.remove('active');
            renderBoard();
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('time-left').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('lose-modal').classList.add('active');
                }
            }, 1000);
        }

        function renderBoard() {
            const topRow = document.getElementById('top-row');
            const bottomRow = document.getElementById('bottom-row');

            // Render 11 số hàng ngang
            gameData.forEach(item => {
                const card = document.createElement('div');
                card.classList.add('card', 'number-card');
                card.innerText = item.label;
                card.onclick = () => {
                    if (selectedNumberElement) selectedNumberElement.classList.remove('selected');
                    selectedNumberId = item.id;
                    selectedNumberElement = card;
                    card.classList.add('selected');
                };
                topRow.appendChild(card);
            });

            // Render 11 hình hàng ngang (xáo trộn)
            const shuffled = [...gameData].sort(() => Math.random() - 0.5);
            shuffled.forEach(item => {
                const card = document.createElement('div');
                card.classList.add('card', 'image-card');
                card.innerHTML = `<img src="${item.label}.png" onerror="this.src='https://via.placeholder.com/50'"><div class="image-name">${item.text}</div>`;
                card.onclick = () => {
                    if (selectedNumberId === null) return;
                    if (selectedNumberId === item.id) {
                        card.classList.add('hidden-card');
                        selectedNumberElement.classList.add('hidden-card');
                        matchedPairs++;
                        if (matchedPairs === gameData.length) {
                            clearInterval(timerInterval);
                            document.getElementById('win-modal').classList.add('active');
                        }
                    } else {
                        card.classList.add('shake');
                        setTimeout(() => card.classList.remove('shake'), 300);
                    }
                    selectedNumberId = null;
                    if (selectedNumberElement) selectedNumberElement.classList.remove('selected');
                };
                bottomRow.appendChild(card);
            });
        }
    </script>
</body>
</html>
